minimumLimaVersion: 2.0.0

base:
  - template:ubuntu-lts

vmType: vz
networks:
  - vzNAT: true
cpus: 6
memory: 12GiB
disk: 250GiB
plain: true

user:
  name: dev
  comment: Development User
  home: /home/dev
  shell: /usr/bin/zsh

mounts: []

containerd:
  system: false
  user: false

provision:
  - mode: system
    file: dev-ubuntu-system.sh

probes:
  - mode: readiness
    description: VM users, workspace, chezmoi, and mise exist
    script: |
      #!/bin/bash
      set -eux -o pipefail
      test -d /home/dev/code
      command -v chezmoi
      command -v mise

message: |
  Ubuntu work VM ready.
  Dev shell:   limactl shell --tty --reconnect --workdir /home/dev --shell /usr/bin/zsh {{.Name}}
