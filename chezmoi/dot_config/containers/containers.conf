# Podman container engine config. Managed by home-sweet-home (chezmoi).
#
# Why this file exists:
# Podman's `docker compose` subcommand delegates to an "external
# compose provider". We point it at the real docker compose v2 Go
# binary (installed to /usr/local/lib/docker/cli-plugins/docker-compose
# by lima/dev-ubuntu-system.sh) — it supports every compose-spec
# feature, including environment-sourced secrets, which podman-compose
# (the Python reimplementation) still does not. docker compose v2
# talks to podman via DOCKER_HOST (set in ~/.zprofile) which points at
# the podman user socket.
#
# If the binary is missing (e.g. first apply on a VM before bootstrap
# finishes), podman falls back to whatever else is on PATH.
[engine]
compose_providers = ["/usr/local/lib/docker/cli-plugins/docker-compose", "podman-compose"]
compose_warning_logs = false
