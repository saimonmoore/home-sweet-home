# Podman container engine config. Managed by home-sweet-home (chezmoi).
#
# Why this file exists:
# Podman's `docker compose` subcommand delegates to an "external
# compose provider" and by default probes for `docker-compose` on
# PATH first. On Ubuntu a stray apt-installed `docker-compose` is
# Python compose v1, which uses a different argument order than
# compose v2 — any Makefile / script written against `docker compose`
# v2 breaks with v1 as the provider.
#
# Pinning the provider to `podman-compose` (the Python v2 rewrite
# shipped by the podman-compose apt package) makes `docker compose`,
# `podman compose` and `podman-compose` all behave identically, so
# upstream Makefiles that assume docker compose v2 Just Work.
[engine]
compose_providers = ["podman-compose"]
compose_warning_logs = false
